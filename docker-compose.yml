services:
  db:
    image: postgres:16-alpine
    container_name: zendesk_lite_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zendesk_lite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zendesk_lite"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
