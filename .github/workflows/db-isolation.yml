name: DB Isolation Gate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate-db-isolation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zendesk_lite
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d zendesk_lite"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zendesk_lite
        run: npm run db:migrate

      - name: Seed database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zendesk_lite
        run: npm run db:seed

      - name: Verify tenant isolation
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zendesk_lite
        run: npm run db:verify-isolation
